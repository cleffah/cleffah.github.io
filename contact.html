<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cleffah - Contact</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.css" integrity="sha256-BicZsQAhkGHIoR//IB2amPN5SrRb3fHB8tFsnqRAwnk=" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
</head>
<body>
    
    <!-- Header --><div include-html="/partials/header.html"></div>
    
    <!-- Body Main -->
    <div class="container-md">
        <h1 class="mb-3">Contact</h1>
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text" id="inputEmailLabel">Email</span>
                <input id="inputEmail" type="email" class="form-control" aria-describedby="inputEmailHelp">
            </div>
            <div id="inputEmailHelp" class="form-text">Reply-to address</div>
        </div>
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text" id="inputSubjectLabel">Subject</span>
                <input id="inputSubject" type="text" class="form-control" aria-describedby="inputSubjectHelp">
            </div>
            <div id="inputSubjectHelp" class="form-text">Subject of your message</div>
        </div>
        <div class="mb-3">
            <label for="inputMessage" class="form-label">Message</label>
            <textarea id="inputMessage" rows="8" class="form-control" aria-describedby="inputMessageHelp"></textarea>
            <div id="inputMessageHelp" class="form-text">Body of your message</div>
        </div>
        <button type="button" class="btn btn-primary" onclick="sendMessage();">Send</button>
    </div>
    
    <!-- Footer --><div include-html="/partials/footer.html"></div>

    <script src="/js/contact.js"></script>

    <!-- include global JavaScript --><script src="/js/global.js"></script>
    <!-- include HTML partials --><script>includeHTML();</script>

</body>
</html>
